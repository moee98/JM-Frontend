server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ──────────────────────────────────────────────────────
    # Forwards /api/* to the backend Kestrel container on port 5000.
    # The "backend" hostname is resolved by Docker Compose's internal DNS.
    location /api/ {
        proxy_pass         http://backend:5000/api/;
        proxy_http_version 1.1;

        # Forward the original host and client IP so the backend can log them
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required so the HTTP-only jwt cookie is forwarded on every request
        proxy_pass_header  Set-Cookie;

        # Allow larger uploads (e.g. inspection photo attachments)
        client_max_body_size 20M;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    # Any URL that doesn't match a real file is served as index.html so
    # React Router handles the client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
